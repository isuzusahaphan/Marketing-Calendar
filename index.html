<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Workspace ⚡️</title>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        /* =========================================
           1. Core & Background
           ========================================= */
        :root {
            --bg-main: #f3f8ff; /* พื้นหลังสว่างอมฟ้า ให้ความรู้สึกโปร่งสบาย */
            --text-main: #2b3440;
            --text-muted: #718096;
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            background: var(--bg-main);
            background-image: radial-gradient(circle at 10% 20%, rgba(216, 241, 230, 0.46) 0%, rgba(233, 226, 255, 0.28) 90%);
            font-family: 'Prompt', sans-serif;
            color: var(--text-main);
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        /* Container */
        .workspace-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(8, 112, 184, 0.07);
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* =========================================
           2. Buttons & Gradients
           ========================================= */
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px;
            padding: 0.7rem 1.5rem; font-weight: 500; font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-2px); box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4); color: white;
        }

        .btn-outline-glass {
            background: rgba(255, 255, 255, 0.8); color: var(--text-main);
            border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 0.7rem 1.5rem; font-weight: 500; font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-outline-glass:hover { background: #f8fafc; border-color: #cbd5e1; transform: translateY(-2px); }

        /* =========================================
           3. Calendar & Colorful Headers
           ========================================= */
        .fc-toolbar-title {
            font-weight: 800 !important; font-size: 1.8rem !important;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .fc .fc-button-primary {
            background: white !important; color: var(--text-main) !important;
            border: 1px solid #e2e8f0 !important; border-radius: 10px !important;
            font-family: 'Prompt', sans-serif; font-weight: 500; text-transform: capitalize;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02) !important;
        }
        .fc .fc-button-primary:hover, .fc .fc-button-active { background: #f1f5f9 !important; border-color: #cbd5e1 !important; }

        /* สี Gradient ประจำวัน (สดใสแต่นุ่มนวล) */
        th.fc-col-header-cell { border: none !important; padding: 12px 0; }
        .fc-col-header-cell-cushion { color: #fff !important; font-size: 1rem; font-weight: 600; text-decoration: none !important; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        th.fc-day-sun { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%) !important; } /* อาทิตย์ - แดง/ชมพู */
        th.fc-day-mon { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%) !important; } /* จันทร์ - เหลือง/ส้ม */
        th.fc-day-tue { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%) !important; } /* อังคาร - ชมพู/ม่วงอ่อน */
        th.fc-day-wed { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%) !important; } /* พุธ - เขียว/ฟ้า */
        th.fc-day-thu { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%) !important; } /* พฤหัส - ส้มพีช */
        th.fc-day-fri { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%) !important; } /* ศุกร์ - ฟ้าสดใส */
        th.fc-day-sat { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%) !important; } /* เสาร์ - ม่วง/ฟ้า */

        /* วันในปฏิทิน */
        .fc-daygrid-day { transition: all 0.2s; border-color: #f1f5f9; }
        .fc-daygrid-day:hover { background-color: rgba(102, 126, 234, 0.05); cursor: pointer; }
        .fc-daygrid-day-number { color: var(--text-muted); font-weight: 500; text-decoration: none !important; padding: 8px; }

        /* ตัวงาน (Events) แบบ Gradient */
        .fc-event {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%) !important; /* ฟ้าสว่าง */
            border: none !important; border-radius: 8px; padding: 5px 8px; margin: 2px 4px;
            font-size: 0.85rem; font-weight: 500; color: #fff !important;
            box-shadow: 0 4px 10px rgba(0, 242, 254, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .fc-event:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 6px 15px rgba(0, 242, 254, 0.4); z-index: 5 !important; }

        /* =========================================
           4. Modals (Clean & Soft Shadow)
           ========================================= */
        .modal-content { border: none; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; }
        .modal-header { border-bottom: 1px solid #f1f5f9; padding: 1.5rem 2rem; background: #fff; }
        .modal-title { font-weight: 700; color: var(--text-main); font-size: 1.4rem; }
        .modal-body { padding: 2rem; background: #fff; }

        /* Forms */
        .form-label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 0.5rem; }
        .form-control { border: 1px solid #e2e8f0; border-radius: 12px; padding: 0.8rem 1rem; font-size: 0.95rem; background-color: #f8fafc; transition: all 0.3s; }
        .form-control:focus { background-color: #fff; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15); outline: none; }

        /* View Detail Card */
        .detail-card { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); border-radius: 16px; padding: 1.5rem; border: 1px solid #e2e8f0; }
        .detail-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; margin-bottom: 0.3rem;}
        .detail-value { font-size: 1.05rem; color: var(--text-main); font-weight: 500; margin-bottom: 1rem; white-space: pre-wrap; }

        /* Loader */
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; gap: 1rem; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loading-overlay" id="globalLoader">
        <div class="spinner"></div>
        <div style="color: #667eea; font-weight: 600; font-size: 1.1rem; margin-top: 10px;">กำลังซิงค์ข้อมูล...</div>
    </div>

    <div class="workspace-container">
        <div class="d-flex justify-content-between align-items-end mb-4 pb-3" style="border-bottom: 2px dashed #e2e8f0;">
            <div>
                <h1 class="fc-toolbar-title" style="margin: 0;">Marketing Board 🎨</h1>
                <div style="color: var(--text-muted); font-size: 1rem; margin-top: 0.3rem;">คลิกที่ปฏิทินเพื่อเพิ่มบรีฟและตารางงานได้เลย!</div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn-outline-glass" onclick="fetchCalendarData()">
                    <i class='bx bx-refresh fs-5'></i> รีเฟรช
                </button>
                <button class="btn-gradient" onclick="openAddModal(new Date().toISOString().split('T')[0])">
                    <i class='bx bx-plus fs-5'></i> สร้างงานใหม่
                </button>
            </div>
        </div>

        <div id="calendar"></div>
    </div>

    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="formModalTitle">สร้างงานใหม่ 📝</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="fId">
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">📅 วันที่</label>
                            <input type="date" id="fDate" class="form-control" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">👤 ผู้รับผิดชอบ</label>
                            <input type="text" id="fAssignee" class="form-control" placeholder="ระบุชื่อทีมงาน...">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">📌 หัวข้องาน <span class="text-danger">*</span></label>
                        <input type="text" id="fTitle" class="form-control" placeholder="เช่น แคมเปญโปรโมชั่น...">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">📝 รายละเอียด / บรีฟ</label>
                        <textarea id="fDesc" class="form-control" rows="4" placeholder="อธิบายรายละเอียดงานที่ต้องทำ..."></textarea>
                    </div>

                    <button type="button" class="btn-gradient w-100 justify-content-center" id="btnSaveForm" style="padding: 0.8rem;">
                        <i class='bx bx-save fs-5'></i> บันทึกข้อมูลลงตาราง
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="viewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="vTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-2">
                    <div class="detail-card mb-4">
                        <div class="detail-label">👤 ผู้รับผิดชอบ</div>
                        <div class="detail-value text-primary" id="vAssignee"></div>
                        
                        <div class="detail-label mt-3">📝 รายละเอียดงาน</div>
                        <div class="detail-value" id="vDesc" style="color: #4a5568; font-size: 0.95rem;"></div>
                    </div>

                    <div class="d-flex gap-3">
                        <button class="btn-outline-glass flex-fill justify-content-center" id="btnGoEdit" style="border-color: #667eea; color: #667eea;">
                            <i class='bx bx-edit-alt'></i> แก้ไขโน้ต
                        </button>
                        <button class="btn-outline-glass flex-fill justify-content-center" id="btnDelete" style="border-color: #fc8181; color: #e53e3e; background: #fff5f5;">
                            <i class='bx bx-trash'></i> ลบทิ้ง
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.all.min.js"></script>

    <script>
        // ==========================================
        // API URL เดิมที่คุณตั้งค่าไว้เรียบร้อยแล้ว
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwYpbBNhtCv8bfIyfvopI24zGXKpyUfuBhWCMsErvxR7I4relWAl3E1MJ1wAaPpzy0/exec";
        
        let calendar;
        const viewModal = new bootstrap.Modal(document.getElementById('viewModal'));
        const formModal = new bootstrap.Modal(document.getElementById('formModal'));
        
        let currentFormMode = 'add'; 
        let currentEventRawData = null;

        document.addEventListener('DOMContentLoaded', function() {
            initCalendar();
            fetchCalendarData();

            // Event Listeners สำหรับปุ่มต่างๆ
            document.getElementById('btnSaveForm').addEventListener('click', handleSave);
            document.getElementById('btnGoEdit').addEventListener('click', () => {
                viewModal.hide();
                setTimeout(() => openEditModal(currentEventRawData), 300); // ดีเลย์ให้ Modal เก่าปิดสนิทก่อน
            });
            document.getElementById('btnDelete').addEventListener('click', handleDelete);
        });

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                headerToolbar: {
                    left: 'title',
                    right: 'prev,next today'
                },
                dayMaxEvents: 4,
                events: [], 
                dateClick: function(info) {
                    openAddModal(info.dateStr); // คลิกช่องว่าง = เพิ่มงานใหม่
                },
                eventClick: function(info) {
                    openViewModal(info.event);  // คลิดที่งาน = ดูรายละเอียด
                }
            });
            calendar.render();
        }

        // ดึงข้อมูล
        function fetchCalendarData() {
            showLoader();
            fetch(`${GAS_URL}?action=getEvents`)
                .then(res => res.json())
                .then(data => {
                    calendar.removeAllEventSources();
                    calendar.addEventSource(data);
                    hideLoader();
                })
                .catch(err => {
                    hideLoader();
                    Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
                });
        }

        // เปิด Modal สร้างใหม่
        function openAddModal(dateStr) {
            currentFormMode = 'add';
            document.getElementById('formModalTitle').innerText = 'สร้างงานใหม่ 📝';
            
            document.getElementById('fId').value = '';
            document.getElementById('fDate').value = dateStr;
            document.getElementById('fTitle').value = '';
            document.getElementById('fAssignee').value = '';
            document.getElementById('fDesc').value = '';
            
            formModal.show();
        }

        // เปิด Modal ดูรายละเอียด
        function openViewModal(eventObj) {
            currentEventRawData = eventObj;
            const p = eventObj.extendedProps;
            
            document.getElementById('vTitle').innerText = eventObj.title;
            document.getElementById('vAssignee').innerText = p.assignee || 'ไม่ได้ระบุ';
            document.getElementById('vDesc').innerText = p.description || 'ไม่มีบรีฟเพิ่มเติม';
            
            viewModal.show();
        }

        // เปิด Modal แก้ไข (ดึงข้อมูลเก่ามาใส่ฟอร์ม)
        function openEditModal(eventObj) {
            currentFormMode = 'edit';
            document.getElementById('formModalTitle').innerText = 'แก้ไขข้อมูลงาน ✏️';
            
            document.getElementById('fId').value = eventObj.id;
            document.getElementById('fDate').value = eventObj.startStr.split('T')[0];
            document.getElementById('fTitle').value = eventObj.title;
            document.getElementById('fAssignee').value = eventObj.extendedProps.assignee;
            document.getElementById('fDesc').value = eventObj.extendedProps.description;
            
            formModal.show();
        }

        // กดปุ่มบันทึก
        function handleSave() {
            const id = document.getElementById('fId').value;
            const title = document.getElementById('fTitle').value.trim();
            const date = document.getElementById('fDate').value;
            const assignee = document.getElementById('fAssignee').value.trim();
            const desc = document.getElementById('fDesc').value.trim();

            if (!title) {
                Swal.fire({ icon: 'warning', title: 'เดี๋ยวก่อน!', text: 'กรุณาตั้งชื่อหัวข้องานด้วยครับ', confirmButtonColor: '#667eea' });
                return;
            }

            const action = currentFormMode === 'add' ? 'addEvent' : 'updateEvent';
            executeAPI(action, { id, title, date, assignee, description: desc }, 'กำลังบันทึกข้อมูล...', formModal);
        }

        // กดปุ่มลบ
        function handleDelete() {
            if(!currentEventRawData) return;
            
            Swal.fire({
                title: 'ยืนยันการลบทิ้ง?',
                text: `คุณแน่ใจหรือไม่ที่จะลบ "${currentEventRawData.title}" ออกจากตาราง?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e53e3e',
                cancelButtonColor: '#cbd5e1',
                confirmButtonText: 'ใช่, ลบเลย!',
                cancelButtonText: 'ยกเลิก',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    executeAPI('deleteEvent', { id: currentEventRawData.id }, viewModal);
                }
            });
        }

        // ฟังก์ชันส่ง Request ไปที่ Google Apps Script
        function executeAPI(action, params, loadingText, modalToClose) {
            Swal.fire({ title: loadingText, allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            const query = new URLSearchParams({ action, ...params }).toString();
            
            fetch(`${GAS_URL}?${query}`, { mode: 'no-cors' })
                .then(() => {
                    modalToClose.hide();
                    Swal.fire({ icon: 'success', title: 'เรียบร้อย!', text: 'ระบบอัปเดตข้อมูลสำเร็จ', timer: 1500, showConfirmButton: false });
                    fetchCalendarData(); // โหลดข้อมูลมาวาดปฏิทินใหม่
                })
                .catch(err => {
                    Swal.fire('ข้อผิดพลาด', 'เกิดปัญหาในการส่งข้อมูลไปที่เซิร์ฟเวอร์', 'error');
                });
        }

        function showLoader() { document.getElementById('globalLoader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('globalLoader').style.display = 'none'; }
    </script>
</body>
</html>
