<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Team Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --fc-border-color: rgba(0,0,0,0.05);
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }
        
        body { 
            background: var(--bg-gradient);
            font-family: 'Prompt', sans-serif; 
            color: #2b3440;
            min-height: 100vh;
        }

        /* Container & Glassmorphism */
        .app-container { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
            margin: 40px auto;
            padding: 30px;
            max-width: 1200px;
        }

        /* Dashboard Cards */
        .stat-card {
            background: #fff;
            border-radius: 16px;
            padding: 15px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .stat-info h3 { margin: 0; font-size: 1.6rem; font-weight: 700; color: #2c3e50; }
        .stat-info p { margin: 0; font-size: 0.85rem; color: #8e9ca8; font-weight: 600; text-transform: uppercase;}

        /* Quick Filters */
        .filter-btn {
            border: 1px solid #eaecf0;
            background: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 500;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .filter-btn.active, .filter-btn:hover {
            background: #2c3e50;
            color: #fff;
            border-color: #2c3e50;
        }

        /* Calendar Styling */
        .fc-toolbar-title { font-weight: 700 !important; color: #1a252f; font-size: 1.5em !important; }
        .fc-button-primary { 
            background: #fff !important; color: #2c3e50 !important; 
            border: 1px solid #eaecf0 !important; border-radius: 10px !important;
        }
        .fc-button-primary:hover { background: #f8f9fa !important; }
        
        /* Pastel Headers */
        th.fc-col-header-cell { padding: 12px 0; border-bottom: none !important;}
        .fc-col-header-cell-cushion { font-weight: 600; color: #333 !important; text-decoration: none !important;}
        th.fc-day-sun { background-color: #ffe5e5 !important; } 
        th.fc-day-mon { background-color: #fffbc4 !important; } 
        th.fc-day-tue { background-color: #ffe0eb !important; } 
        th.fc-day-wed { background-color: #d1f2d1 !important; } 
        th.fc-day-thu { background-color: #ffe5cc !important; } 
        th.fc-day-fri { background-color: #cce5ff !important; } 
        th.fc-day-sat { background-color: #e5ccff !important; } 

        /* Event Items */
        .fc-event { 
            cursor: pointer; padding: 4px 6px; border-radius: 6px; border: none;
            font-size: 0.8em; font-weight: 500; color: #fff !important;
            transition: transform 0.2s ease;
        }
        .fc-event:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); z-index: 5 !important; }

        /* Modal Redesign */
        .modal-content { border-radius: 20px; border: none; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .modal-header { border-bottom: none; padding: 25px 25px 10px 25px; }
        .modal-title { font-weight: 700; color: #1a252f; font-size: 1.4rem;}
        .modal-body { padding: 15px 25px 30px 25px; }
        .platform-badge { padding: 6px 15px; border-radius: 20px; font-size: 0.85em; font-weight: 600; color: white; }
        .desc-box { background: #f8f9fa; border-radius: 12px; padding: 15px; font-size: 0.95em; color: #4a5568; white-space: pre-wrap; }
        
        #loader { text-align: center; padding: 50px; color: #8e9ca8; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h2 class="mb-0" style="font-weight: 700; color: #1a252f;">⚡️ Marketing Hub</h2>
            <p class="text-muted mb-0">ตารางแคมเปญและคอนเทนต์</p>
        </div>
        <div class="d-flex gap-3">
            <div class="stat-card">
                <div style="font-size: 2rem;">🎯</div>
                <div class="stat-info"><h3 id="totalTasks">0</h3><p>Total Tasks</p></div>
            </div>
            <div class="stat-card">
                <div style="font-size: 2rem;">📱</div>
                <div class="stat-info"><h3 id="activePlatforms">0</h3><p>Platforms</p></div>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 mb-4 overflow-auto pb-2" id="filterContainer">
        <button class="filter-btn active" data-platform="all">All Platforms</button>
    </div>

    <div id="loader">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <div>กำลังโหลดข้อมูลจาก Google Sheets...</div>
    </div>

    <div id="calendar" style="display: none;"></div>
</div>

<div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header d-flex justify-content-between align-items-start">
                <h5 class="modal-title" id="modalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <span id="modalPlatform" class="platform-badge"></span>
                    <span style="color: #a0aec0;">|</span>
                    <span style="font-size: 0.95em; color: #4a5568;">
                        👤 <strong>ผู้รับผิดชอบ: </strong><span id="modalAssignee" style="color: #2c3e50;"></span>
                    </span>
                </div>
                <h6 style="font-weight: 600; color: #2c3e50; margin-bottom: 10px;">📝 รายละเอียดงาน:</h6>
                <div class="desc-box" id="modalDescription"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
<script src="https://unpkg.com/@popperjs/core@2"></script>
<script src="https://unpkg.com/tippy.js@6"></script>

<script>
    // ==========================================
    // ⚠️ นำ URL ของ Web App ที่ลงท้ายด้วย /exec มาใส่ตรงนี้
    // ==========================================
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwYpbBNhtCv8bfIyfvopI24zGXKpyUfuBhWCMsErvxR7I4relWAl3E1MJ1wAaPpzy0/exec";
    
    let allEventsData = []; 
    let calendar;

    document.addEventListener('DOMContentLoaded', function() {
        fetchData();
    });

    function fetchData() {
        fetch(`${GAS_WEB_APP_URL}?action=getEvents`)
            .then(res => res.json())
            .then(data => {
                allEventsData = data;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('calendar').style.display = 'block';
                
                updateDashboard(data);
                generateFilters(data);
                initCalendar(data);
            })
            .catch(err => {
                console.error("Fetch Error:", err);
                document.getElementById('loader').innerHTML = "<span class='text-danger'>เชื่อมต่อล้มเหลว โปรดตรวจสอบ URL ของ GAS อีกครั้ง</span>";
            });
    }

    function updateDashboard(data) {
        document.getElementById('totalTasks').innerText = data.length;
        const platforms = new Set(data.map(item => item.extendedProps.platform.trim().toLowerCase()));
        document.getElementById('activePlatforms').innerText = platforms.size;
    }

    function generateFilters(data) {
        const container = document.getElementById('filterContainer');
        const platforms = [...new Set(data.map(item => item.extendedProps.platform.trim()))].filter(Boolean);
        
        platforms.forEach(platform => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.setAttribute('data-platform', platform);
            btn.innerText = platform;
            btn.onclick = (e) => applyFilter(e, platform);
            container.appendChild(btn);
        });

        container.querySelector('[data-platform="all"]').onclick = (e) => applyFilter(e, 'all');
    }

    function applyFilter(e, platform) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');

        let filteredData = allEventsData;
        if (platform !== 'all') {
            filteredData = allEventsData.filter(item => item.extendedProps.platform.trim() === platform);
        }

        calendar.removeAllEventSources();
        calendar.addEventSource(filteredData);
    }

    function initCalendar(eventsData) {
        const calendarEl = document.getElementById('calendar');
        const eventModal = new bootstrap.Modal(document.getElementById('eventModal'));

        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            events: eventsData,
            headerToolbar: {
                left: 'title',
                right: 'prev,next today' 
            },
            dayMaxEvents: 3, 
            moreLinkContent: function(arg) {
                return `+ ดูอีก ${arg.num} งาน`;
            },
            eventDidMount: function(info) {
                tippy(info.el, {
                    content: `
                        <div style="text-align:left; font-family:'Prompt';">
                            <strong style="font-size: 1.1em; color: #fff;">${info.event.title}</strong><br>
                            <div style="margin-top: 5px; color: #e2e8f0; font-size: 0.85em; font-weight:300;">
                                👤 ${info.event.extendedProps.assignee}<br>
                                📱 ${info.event.extendedProps.platform}
                            </div>
                        </div>
                    `,
                    allowHTML: true,
                    theme: 'material',
                    placement: 'top',
                    animation: 'scale'
                });
            },
            eventClick: function(info) {
                const props = info.event.extendedProps;
                document.getElementById('modalTitle').innerText = info.event.title;
                document.getElementById('modalPlatform').innerText = props.platform;
                document.getElementById('modalPlatform').style.backgroundColor = info.event.backgroundColor;
                document.getElementById('modalAssignee').innerText = props.assignee;
                document.getElementById('modalDescription').innerText = props.description || 'ไม่มีรายละเอียดเพิ่มเติม';
                
                eventModal.show();
            }
        });

        calendar.render();
    }
</script>

</body>
</html>
