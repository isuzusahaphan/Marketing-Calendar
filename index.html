<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Workspace ⚡️</title>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale.css"/>

    <style>
        /* =========================================
           1. Core & Background
           ========================================= */
        :root {
            --bg-main: #f3f8ff;
            --text-main: #2b3440;
            --text-muted: #718096;
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            background: var(--bg-main);
            background-image: radial-gradient(circle at 10% 20%, rgba(216, 241, 230, 0.46) 0%, rgba(233, 226, 255, 0.28) 90%);
            font-family: 'Prompt', sans-serif;
            color: var(--text-main);
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .workspace-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(8, 112, 184, 0.07);
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* =========================================
           2. Buttons
           ========================================= */
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px;
            padding: 0.7rem 1.5rem; font-weight: 500; display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4); color: white; }

        .btn-outline-glass {
            background: white; color: var(--text-main);
            border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 0.7rem 1.5rem; font-weight: 500; display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.3s ease;
        }
        .btn-outline-glass:hover { background: #f8fafc; transform: translateY(-2px); border-color: #cbd5e1; }

        /* =========================================
           3. Calendar Styling
           ========================================= */
        .fc-toolbar-title {
            font-weight: 800 !important; font-size: 1.8rem !important;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .fc .fc-button-primary { 
            background: white !important; color: #2c3e50 !important; 
            border: 1px solid #e2e8f0 !important; border-radius: 8px !important; 
            font-family: 'Prompt', sans-serif; text-transform: capitalize; font-weight: 500;
        }
        .fc .fc-button-primary:hover, .fc .fc-button-active { background: #f1f5f9 !important; border-color: #cbd5e1 !important; color: #667eea !important; }

        /* Colorful Gradient Headers */
        th.fc-col-header-cell { border: none !important; padding: 12px 0; }
        .fc-col-header-cell-cushion { color: #fff !important; font-weight: 600; text-decoration: none !important; }
        
        th.fc-day-sun { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%) !important; }
        th.fc-day-mon { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%) !important; }
        th.fc-day-tue { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%) !important; }
        th.fc-day-wed { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%) !important; }
        th.fc-day-thu { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%) !important; }
        th.fc-day-fri { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%) !important; }
        th.fc-day-sat { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%) !important; }

        .fc-daygrid-day { cursor: pointer; transition: 0.2s; }
        .fc-daygrid-day:hover { background-color: rgba(102, 126, 234, 0.05); }

        .fc-event {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%) !important;
            border: none !important; border-radius: 8px; padding: 5px 8px; margin: 2px 4px;
            font-size: 0.85rem; font-weight: 500; color: #fff !important; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 242, 254, 0.2); transition: transform 0.2s;
        }
        .fc-event:hover { transform: translateY(-2px) scale(1.02); z-index: 5 !important; }

        /* =========================================
           4. Modals & Loaders
           ========================================= */
        .modal-content { border: none; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .detail-card { background: #f8fafc; border-radius: 16px; padding: 1.5rem; border: 1px solid #e2e8f0; }
        .tippy-box { font-family: 'Prompt', sans-serif; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loading-overlay" id="globalLoader">
        <div class="spinner"></div>
        <div style="color: #667eea; font-weight: 600; margin-top: 10px;">กำลังซิงค์ข้อมูล...</div>
    </div>

    <div class="workspace-container">
        <div class="d-flex justify-content-between align-items-end mb-4 pb-3" style="border-bottom: 2px dashed #e2e8f0;">
            <div>
                <h1 class="fc-toolbar-title" style="margin: 0;">Marketing Board 🎨</h1>
                <div style="color: var(--text-muted); font-size: 0.95rem;">คลิกช่องว่างเพื่อเพิ่มโน้ต | ชี้ที่งานเพื่อดูย่อ | คลิกที่งานเพื่อแก้ไข</div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn-outline-glass" onclick="fetchCalendarData()"><i class='bx bx-refresh fs-5'></i> ซิงค์ข้อมูล</button>
                <button class="btn-gradient" onclick="openAddModal(new Date().toISOString().split('T')[0])"><i class='bx bx-plus fs-5'></i> สร้างงานใหม่</button>
            </div>
        </div>
        
        <div id="calendar"></div>
    </div>

    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4">
                <div class="modal-header border-0 pb-0"><h5 class="fw-bold" id="formModalTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="fId">
                    <div class="row mb-3">
                        <div class="col-6"><label class="small fw-bold text-muted mb-1">วันที่</label><input type="date" id="fDate" class="form-control rounded-3" readonly style="background: #f1f5f9;"></div>
                        <div class="col-6"><label class="small fw-bold text-muted mb-1">ผู้รับผิดชอบ</label><input type="text" id="fAssignee" class="form-control rounded-3" placeholder="ระบุชื่อ..."></div>
                    </div>
                    <div class="mb-3"><label class="small fw-bold text-muted mb-1">หัวข้องาน <span class="text-danger">*</span></label><input type="text" id="fTitle" class="form-control rounded-3" placeholder="เช่น โปรโมชั่นกลางเดือน..."></div>
                    <div class="mb-4"><label class="small fw-bold text-muted mb-1">รายละเอียด / บรีฟ</label><textarea id="fDesc" class="form-control rounded-3" rows="3" placeholder="ใส่รายละเอียดที่นี่..."></textarea></div>
                    <button class="btn-gradient w-100 justify-content-center" id="btnSaveForm" style="padding: 0.8rem;"><i class='bx bx-save fs-5'></i> บันทึกข้อมูลลงตาราง</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="viewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4">
                <div class="modal-header border-0 pb-0"><h5 class="fw-bold" id="vTitle" style="color: #2a5298;"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="detail-card mb-4">
                        <div class="small fw-bold text-muted mb-1">👤 ผู้รับผิดชอบ</div><div class="mb-3 fw-500 text-primary" id="vAssignee"></div>
                        <div class="small fw-bold text-muted mb-1">📝 รายละเอียดงาน</div><div id="vDesc" style="font-size: 0.95rem; white-space: pre-wrap; color: #4a5568;"></div>
                    </div>
                    <div class="d-flex gap-3">
                        <button class="btn btn-outline-primary flex-fill rounded-3" id="btnGoEdit" style="padding: 0.6rem;"><i class='bx bx-edit-alt'></i> แก้ไข</button>
                        <button class="btn btn-outline-danger flex-fill rounded-3" id="btnDelete" style="padding: 0.6rem;"><i class='bx bx-trash'></i> ลบทิ้ง</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.all.min.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwYpbBNhtCv8bfIyfvopI24zGXKpyUfuBhWCMsErvxR7I4relWAl3E1MJ1wAaPpzy0/exec";
        
        let calendar;
        const vModal = new bootstrap.Modal(document.getElementById('viewModal'));
        const fModal = new bootstrap.Modal(document.getElementById('formModal'));
        let currentEvent = null;
        let currentMode = 'add';

        document.addEventListener('DOMContentLoaded', function() {
            // สร้างโครงปฏิทิน
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', 
                locale: 'th',
                
                // --- เพิ่มปุ่มสลับมุมมอง (Month / Week) ---
                headerToolbar: { 
                    left: 'title', 
                    right: 'dayGridMonth,timeGridWeek prev,next today' 
                },
                buttonText: {
                    month: 'เดือน',
                    week: 'สัปดาห์',
                    today: 'วันนี้'
                },
                // ------------------------------------

                events: [],
                
                // 1. Hover เพื่อดูข้อมูลเบื้องต้น (Tippy.js)
                eventDidMount: function(info) {
                    tippy(info.el, {
                        content: `
                            <div style="text-align:left; padding: 4px;">
                                <strong style="font-size: 1.1em; color: #fff;">${info.event.title}</strong><br>
                                <div style="margin-top: 6px; color: #e2e8f0; font-size: 0.9em;">
                                    👤 ${info.event.extendedProps.assignee || 'ไม่ได้ระบุคนรับผิดชอบ'}
                                </div>
                            </div>
                        `,
                        allowHTML: true,
                        theme: 'material', // ใช้ธีมมาตรฐานที่มากับ Tippy ก็สวยแล้วครับ
                        placement: 'top',
                        animation: 'scale'
                    });
                },

                // 2. คลิกช่องว่างเพื่อเปิด Form สร้างงาน
                dateClick: (info) => openAddModal(info.dateStr),

                // 3. คลิกที่งานเพื่อเปิด Modal ดูข้อมูลเต็มๆ
                eventClick: (info) => openViewModal(info.event)
            });
            
            calendar.render();
            fetchCalendarData();

            // จับคู่ปุ่มกับฟังก์ชัน
            document.getElementById('btnSaveForm').onclick = handleSave;
            document.getElementById('btnDelete').onclick = handleDelete;
            document.getElementById('btnGoEdit').onclick = () => { 
                vModal.hide(); 
                setTimeout(() => openEditModal(currentEvent), 200); // รอหน้าต่าง View ปิดก่อนแล้วเปิดฟอร์มแก้
            };
        });

        // ดึงข้อมูล
        function fetchCalendarData() {
            showLoader();
            fetch(`${GAS_URL}?action=getEvents`)
                .then(r => r.json())
                .then(data => {
                    calendar.removeAllEventSources(); 
                    calendar.addEventSource(data); 
                    hideLoader();
                })
                .catch(() => { hideLoader(); Swal.fire('Error', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error'); });
        }

        function openAddModal(date) {
            currentMode = 'add'; 
            document.getElementById('formModalTitle').innerHTML = 'สร้างงานใหม่ 📝';
            document.getElementById('fId').value = ''; 
            document.getElementById('fDate').value = date;
            document.getElementById('fTitle').value = ''; 
            document.getElementById('fAssignee').value = '';
            document.getElementById('fDesc').value = ''; 
            fModal.show();
        }

        function openViewModal(event) {
            currentEvent = event;
            document.getElementById('vTitle').innerText = event.title;
            document.getElementById('vAssignee').innerText = event.extendedProps.assignee || '-';
            document.getElementById('vDesc').innerText = event.extendedProps.description || '-';
            vModal.show();
        }

        function openEditModal(event) {
            currentMode = 'edit'; 
            document.getElementById('formModalTitle').innerHTML = 'แก้ไขงาน ✏️';
            document.getElementById('fId').value = event.id;
            document.getElementById('fDate').value = event.startStr.split('T')[0];
            document.getElementById('fTitle').value = event.title;
            document.getElementById('fAssignee').value = event.extendedProps.assignee;
            document.getElementById('fDesc').value = event.extendedProps.description;
            fModal.show();
        }

        function handleSave() {
            const action = currentMode === 'add' ? 'addEvent' : 'updateEvent';
            const params = {
                id: document.getElementById('fId').value,
                title: document.getElementById('fTitle').value.trim(),
                date: document.getElementById('fDate').value,
                assignee: document.getElementById('fAssignee').value.trim(),
                description: document.getElementById('fDesc').value.trim()
            };
            if(!params.title) return Swal.fire('เดี๋ยวก่อน!', 'กรุณาใส่หัวข้องานด้วยครับ', 'warning');
            execute(action, params, fModal);
        }

        function handleDelete() {
            Swal.fire({ 
                title: 'ยืนยันการลบ?', 
                text: "ข้อมูลนี้จะหายไปจากตารางทันที",
                icon: 'warning', 
                showCancelButton: true,
                confirmButtonColor: '#e53e3e',
                cancelButtonText: 'ยกเลิก',
                confirmButtonText: 'ลบทิ้ง'
            }).then(r => {
                if(r.isConfirmed) execute('deleteEvent', {id: currentEvent.id}, vModal);
            });
        }

        function execute(action, p, modal) {
            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            const query = new URLSearchParams({action, ...p}).toString();
            fetch(`${GAS_URL}?${query}`, {mode: 'no-cors'}).then(() => {
                modal.hide(); 
                Swal.fire({icon: 'success', title: 'สำเร็จ!', showConfirmButton: false, timer: 1200});
                fetchCalendarData();
            }).catch(() => Swal.fire('Error', 'เกิดข้อผิดพลาดในการส่งข้อมูล', 'error'));
        }

        function showLoader() { document.getElementById('globalLoader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('globalLoader').style.display = 'none'; }
    </script>
</body>
</html>
