<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Team Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Prompt', sans-serif; }
        .app-container { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin: 30px auto; padding: 25px; max-width: 1100px; }
        th.fc-col-header-cell { padding: 10px 0; border: none !important; }
        th.fc-day-sun { background-color: #ffe5e5 !important; } th.fc-day-mon { background-color: #fffbc4 !important; } th.fc-day-tue { background-color: #ffe0eb !important; } th.fc-day-wed { background-color: #d1f2d1 !important; } th.fc-day-thu { background-color: #ffe5cc !important; } th.fc-day-fri { background-color: #cce5ff !important; } th.fc-day-sat { background-color: #e5ccff !important; }
        .fc-event { cursor: pointer; border-radius: 6px; border: none; padding: 4px; font-size: 0.85em; }
        .modal-content { border-radius: 20px; border: none; }
        .btn-custom { border-radius: 10px; padding: 10px 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Marketing Hub ⚡️</h2>
        <button class="btn btn-dark btn-custom" onclick="calendar.refetchEvents()">🔄 รีเฟรช</button>
    </div>
    <div id="calendar"></div>
</div>

<div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-3">
            <div id="viewMode">
                <div class="modal-header border-0">
                    <h5 class="fw-bold" id="vTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted mb-2">👤 ผู้รับผิดชอบ: <span id="vAssignee" class="text-dark fw-bold"></span></p>
                    <div id="vDesc" class="p-3 bg-light rounded mb-4" style="white-space: pre-wrap;"></div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-primary w-50 btn-custom" id="btnGoEdit">แก้ไขโน้ต</button>
                        <button class="btn btn-outline-danger w-50 btn-custom" id="btnDelete">ลบทิ้ง</button>
                    </div>
                </div>
            </div>
            <div id="editMode" style="display:none;">
                <div class="modal-header border-0">
                    <h5 class="fw-bold">แก้ไขข้อมูล</h5>
                    <button type="button" class="btn-close" onclick="switchMode('view')"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-3"><label class="small fw-bold">หัวข้อ</label><input type="text" id="eTitle" class="form-control"></div>
                    <div class="mb-3"><label class="small fw-bold">ผู้รับผิดชอบ</label><input type="text" id="eAssignee" class="form-control"></div>
                    <div class="mb-3"><label class="small fw-bold">รายละเอียด</label><textarea id="eDesc" class="form-control" rows="3"></textarea></div>
                    <button class="btn btn-primary w-100 btn-custom" id="btnUpdate">บันทึกการแก้ไข</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-3">
            <div class="modal-header border-0">
                <h5 class="fw-bold">เพิ่มโน้ตใหม่ - <span id="addDateLabel"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="addDate">
                <div class="mb-3"><label class="small fw-bold">หัวข้อ</label><input type="text" id="aTitle" class="form-control"></div>
                <div class="mb-3"><label class="small fw-bold">ผู้รับผิดชอบ</label><input type="text" id="aAssignee" class="form-control"></div>
                <div class="mb-3"><label class="small fw-bold">รายละเอียด</label><textarea id="aDesc" class="form-control" rows="3"></textarea></div>
                <button class="btn btn-dark w-100 btn-custom" id="btnSave">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>

<script>
    const GAS_URL = "ใส่_URL_ที่ลงท้ายด้วย_exec_ตรงนี้";
    let calendar;
    const viewModal = new bootstrap.Modal(document.getElementById('viewModal'));
    const addModal = new bootstrap.Modal(document.getElementById('addModal'));

    document.addEventListener('DOMContentLoaded', function() {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth', locale: 'th',
            headerToolbar: { left: 'title', right: 'prev,next today' },
            events: (info, success) => fetch(`${GAS_URL}?action=getEvents`).then(r => r.json()).then(success),
            dateClick: (info) => {
                document.getElementById('addDate').value = info.dateStr;
                document.getElementById('addDateLabel').innerText = info.dateStr;
                addModal.show();
            },
            eventClick: (info) => {
                const p = info.event.extendedProps;
                document.getElementById('editId').value = info.event.id;
                document.getElementById('vTitle').innerText = info.event.title;
                document.getElementById('vAssignee').innerText = p.assignee;
                document.getElementById('vDesc').innerText = p.description;
                // เตรียมข้อมูลใส่ฟอร์มเผื่อกดแก้
                document.getElementById('eTitle').value = info.event.title;
                document.getElementById('eAssignee').value = p.assignee;
                document.getElementById('eDesc').value = p.description;
                switchMode('view');
                viewModal.show();
            }
        });
        calendar.render();

        // บันทึกใหม่
        document.getElementById('btnSave').onclick = function() {
            callApi('addEvent', {
                title: document.getElementById('aTitle').value,
                assignee: document.getElementById('aAssignee').value,
                description: document.getElementById('aDesc').value,
                date: document.getElementById('addDate').value
            }, addModal);
        };

        // แก้ไข
        document.getElementById('btnUpdate').onclick = function() {
            callApi('updateEvent', {
                id: document.getElementById('editId').value,
                title: document.getElementById('eTitle').value,
                assignee: document.getElementById('eAssignee').value,
                description: document.getElementById('eDesc').value
            }, viewModal);
        };

        // ลบ
        document.getElementById('btnDelete').onclick = function() {
            if(confirm("ยืนยันการลบโน้ตนี้?")) {
                callApi('deleteEvent', { id: document.getElementById('editId').value }, viewModal);
            }
        };

        document.getElementById('btnGoEdit').onclick = () => switchMode('edit');
    });

    function switchMode(mode) {
        document.getElementById('viewMode').style.display = mode === 'view' ? 'block' : 'none';
        document.getElementById('editMode').style.display = mode === 'edit' ? 'block' : 'none';
    }

    function callApi(action, params, modal) {
        const query = new URLSearchParams({action, ...params}).toString();
        fetch(`${GAS_URL}?${query}`, { mode: 'no-cors' }).then(() => {
            modal.hide();
            calendar.refetchEvents();
        });
    }
</script>
</body>
</html>
